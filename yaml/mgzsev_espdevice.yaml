    name: "MG Car Locked"
    device_class: lock

interval:
  - interval: 2s
    then:
      - lambda: |-
          // Alapértelmezetten menjen az ébresztés (true)
          bool should_wake = true;

          // HA az érték kisebb vagy egyenlő, mint 12.3V
          if (!std::isnan(id(mg_batt_voltage).state)) {
            if (id(mg_batt_voltage).state <= 12.3f) {
              should_wake = false;
            }
          }

          if (should_wake) {
            id(can_bus_mg).send_data(0x7DF, false, {0x02, 0x3E, 0x80, 0, 0, 0, 0, 0});
            id(can_bus_mg).send_data(0x7DF, false, {0x02, 0x10, 0x03, 0, 0, 0, 0, 0});
          } else {
            // INFO szinten logolunk, hogy lássuk miért áll meg az olvasás (tehát a CAN-t miért hagytuk elaludni)
            ESP_LOGI("canbus", "A fedélzeti akkumlátor védelmében az ébresztést abbahagytam! (V: %.2fV)", id(mg_batt_voltage).state);
          }

  - interval: 10s
    then:
      - canbus.send: { can_id: 0x781, data: [0x03, 0x22, 0xB0, 0x42, 0, 0, 0, 0] } # Volt
      - delay: 50ms
      - canbus.send: { can_id: 0x781, data: [0x03, 0x22, 0xB0, 0x43, 0, 0, 0, 0] } # Current
      - delay: 50ms
      - canbus.send: { can_id: 0x781, data: [0x03, 0x22, 0xB0, 0x46, 0, 0, 0, 0] } # SOC
      - delay: 50ms
      - canbus.send: { can_id: 0x781, data: [0x03, 0x22, 0xB0, 0x56, 0, 0, 0, 0] } # Temp
      - delay: 50ms
      - canbus.send: { can_id: 0x781, data: [0x03, 0x22, 0xB0, 0x5C, 0, 0, 0, 0] } # Coolant
      - delay: 50ms
      - canbus.send: { can_id: 0x781, data: [0x03, 0x22, 0xB0, 0x61, 0, 0, 0, 0] } # SOH
      - delay: 50ms
      - canbus.send: { can_id: 0x781, data: [0x03, 0x22, 0xB0, 0x48, 0, 0, 0, 0] } # Status
      - delay: 50ms
      - canbus.send: { can_id: 0x781, data: [0x03, 0x22, 0xB0, 0x1E, 0, 0, 0, 0] } # AC Count
      - delay: 50ms
      - canbus.send: { can_id: 0x781, data: [0x03, 0x22, 0xB0, 0x1F, 0, 0, 0, 0] } # DC Count
      - delay: 50ms
      - canbus.send: { can_id: 0x785, data: [0x03, 0x22, 0xB5, 0x87, 0, 0, 0, 0] } # DCDC Temp
      - delay: 50ms
      - canbus.send: { can_id: 0x7E3, data: [0x03, 0x22, 0x01, 0x12, 0, 0, 0, 0] } # 12V
      - delay: 50ms
      - canbus.send: { can_id: 0x7E3, data: [0x03, 0x22, 0xB7, 0x1B, 0, 0, 0, 0] } # Plug
      - delay: 50ms
      - canbus.send: { can_id: 0x750, data: [0x03, 0x22, 0xE0, 0x1B, 0, 0, 0, 0] } # Ambient / HVAC
      - delay: 50ms
      - canbus.send: { can_id: 0x741, data: [0x03, 0x22, 0xB5, 0x01, 0, 0, 0, 0] } # Lock
      - delay: 50ms
      - canbus.send: { can_id: 0x760, data: [0x03, 0x22, 0xB1, 0x01, 0, 0, 0, 0] } # Odometer
      - delay: 50ms
      - canbus.send: { can_id: 0x781, data: [0x03, 0x22, 0xF1, 0x94, 0, 0, 0, 0] } # SW Ver

