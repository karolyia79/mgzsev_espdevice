canbus:
  - platform: esp32_can
    id: can_bus_mg
    can_id: 1
    tx_pin: GPIO5
    rx_pin: GPIO4
    bit_rate: 500kbps
    on_frame:
      # --- BMS VÁLASZOK (0x789) ---
      - can_id: 0x789
        then:
          - lambda: |-
              // SZOFTVER VERZIÓ (F194)
              if (x[1]==0x62 && x[2]==0xF1 && x[3]==0x94) {
                uint32_t sw_raw = ((uint32_t)x[4] << 16) | ((uint32_t)x[5] << 8) | (uint32_t)x[6];
                switch (sw_raw) {
                  case 4272176: id(mg_bms_sw_version).publish_state("A00"); break;
                  case 4272177: id(mg_bms_sw_version).publish_state("A01"); break;
                  case 5386551: id(mg_bms_sw_version).publish_state("R17"); break;
                  case 4543793: id(mg_bms_sw_version).publish_state("EU1"); break;
                  case 5387312: id(mg_bms_sw_version).publish_state("R40"); break;
                  case 5386808: id(mg_bms_sw_version).publish_state("R28"); break;
                  case 5387058: id(mg_bms_sw_version).publish_state("R32"); break;
                  case 5255225: id(mg_bms_sw_version).publish_state("P09"); break;
                  default:      id(mg_bms_sw_version).publish_state("Unknown"); break;
                }
              }

              // BMS ALAPADATOK (B0xx)
              if (x[1]==0x62 && x[2]==0xB0) {
                uint16_t raw_ab = encode_uint16(x[4], x[5]);
                
                if (x[3]==0x42) id(mg_batt_voltage).publish_state(raw_ab * 0.25f);
                if (x[3]==0x46) id(mg_soc_raw).publish_state(raw_ab / 10.0f);
                if (x[3]==0x61) id(mg_soh).publish_state(raw_ab / 100.0f);
                if (x[3]==0x56) id(mg_hv_batt_temp).publish_state((x[4] / 2.0) - 40.0);
                if (x[3]==0x5C) id(mg_batt_coolant_temp).publish_state((x[4] / 2.0) - 40.0);
                
                // ÁRAM: (INT16 - 40000) * 0.25 / 10 = * 0.025
                if (x[3]==0x43) id(mg_batt_current).publish_state(((float)raw_ab - 40000.0f) * 0.025f);

                // STATUS
                if (x[3]==0x48) {
                  id(mg_bms_charging).publish_state(x[4] == 6 || x[4] == 7 || x[4] == 12);
                  switch (x[4]) {
                    case 0: id(mg_bms_status).publish_state("Unlocked"); break;
                    case 1: id(mg_bms_status).publish_state("Idle"); break;
                    case 3: id(mg_bms_status).publish_state("Running"); break;
                    case 6: id(mg_bms_status).publish_state("AC Charging"); break;
                    case 7: id(mg_bms_status).publish_state("DC Charging"); break;
                    case 10: id(mg_bms_status).publish_state("Connected"); break;
                    default: id(mg_bms_status).publish_state("Other"); break;
                  }
                }
                if (x[3]==0x1E) id(mg_ac_charge_count).publish_state(raw_ab);
                if (x[3]==0x1F) id(mg_dc_charge_count).publish_state(raw_ab);
              }

      # --- VCU (0x7EB) ---
      - can_id: 0x7EB
        then:
          - lambda: |-
              if (x[1]==0x62) {
                if (x[2]==0x01 && x[3]==0x12) id(mg_12v_batt_v).publish_state(x[4] / 10.0);
                if (x[2]==0xB7 && x[3]==0x1B) id(mg_charger_connected).publish_state(x[4] > 0);
                if (x[2]==0xB7 && x[3]==0x01) id(mg_charge_time_remaining).publish_state(encode_uint16(x[4], x[5]));
              }

      # --- ODOMETER (0x768) ---
      - can_id: 0x768
        then:
          - lambda: |-
              if (x[1]==0x62 && x[2]==0xB1 && x[3]==0x01) {
                id(mg_odometer).publish_state(x[4] * 65536 + x[5] * 256 + x[6]);
              }

      # --- DCDC (0x78D) ---
      - can_id: 0x78D
        then:
          - lambda: |-
              if (x[1]==0x62 && x[2]==0xB5 && x[3]==0x87) {
                float dcdc_temp = x[4] - 40.0;
                if (dcdc_temp > -35.0 && dcdc_temp < 110.0) id(mg_dcdc_temp).publish_state(dcdc_temp);
              }

      # --- HVAC (0x758) ---
      - can_id: 0x758
        then:
          - lambda: |-
              if (x[1]==0x62 && x[2]==0xE0) {
                if (x[3]==0x1B) {
                  float amb_temp = (encode_uint16(x[4], x[5]) / 10.0) - 40.0;
                  if (amb_temp > -35.0 && amb_temp < 65.0) id(mg_ambient_temp).publish_state(amb_temp);
                  id(mg_hvac_status).publish_state(x[4] == 1 ? "ON" : "OFF");
                }
                if (x[3]==0x13) id(mg_hvac_temp).publish_state((encode_uint16(x[4], x[5]) / 10.0) - 30.0);
                if (x[3]==0x0F) {
                  switch(x[5]) {
                    case 249: id(mg_hvac_blower_speed).publish_state("1"); break;
                    case 43:  id(mg_hvac_blower_speed).publish_state("2"); break;
                    case 100: id(mg_hvac_blower_speed).publish_state("3"); break;
                    case 207: id(mg_hvac_blower_speed).publish_state("4"); break;
                    case 129: id(mg_hvac_blower_speed).publish_state("5"); break;
                    case 182: id(mg_hvac_blower_speed).publish_state("6"); break;
                  }
                }
                if (x[3]==0x07) {
                  switch(x[4]) {
                    case 0: id(mg_hvac_vent_selection).publish_state("Vents"); break;
                    case 1: id(mg_hvac_vent_selection).publish_state("Floor/Vents"); break;
                    case 2: id(mg_hvac_vent_selection).publish_state("Floor"); break;
                    case 3: id(mg_hvac_vent_selection).publish_state("Screen/Floor"); break;
                    case 4: id(mg_hvac_vent_selection).publish_state("Screen"); break;
                    case 6: id(mg_hvac_vent_selection).publish_state("OFF"); break;
                  }
                }
                if (x[3]==0x2D) id(mg_ac_status).publish_state(x[4] == 64 ? "ON" : "OFF");
                if (x[3]==0x1E) id(mg_air_recirc).publish_state(x[4] == 1 ? "Fresh" : "Recirc");
                if (x[3]==0x38) id(mg_rear_demist).publish_state(x[4] == 1 ? "ON" : "OFF");
                if (x[3]==0x2C) id(mg_front_demist).publish_state(x[4] >= 1 ? "ON" : "OFF");
              }

      # --- TPMS (0x72C) ---
      - can_id: 0x72C
        then:
          - lambda: |-
              if (x[1]==0x62 && x[2]==0xB0 && x[3]==0x01) {
                id(mg_tpms_fl).publish_state(x[4] * 4);
                id(mg_tpms_fr).publish_state(x[5] * 4);
                id(mg_tpms_rr).publish_state(x[6] * 4);
                id(mg_tpms_rl).publish_state(x[7] * 4);
              }

      # --- BCM / LOCK (0x749) ---
      - can_id: 0x749
        then:
          - lambda: |-
              if (x[1]==0x62 && x[2]==0xB5 && x[3]==0x01) {
                id(mg_car_locked).publish_state(x[5] & 0x08);
              }

sensor:
  - platform: template
    id: mg_hvac_temp
    name: "MG HVAC Set Temperature"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
  - platform: template
    id: mg_odometer
    name: "MG Odometer"
    unit_of_measurement: "km"
    accuracy_decimals: 0
    state_class: total_increasing
  - platform: template
    id: mg_12v_batt_v
    name: "MG 12V Battery Voltage"
    unit_of_measurement: "V"
    accuracy_decimals: 1
  - platform: template
    id: mg_dcdc_temp
    name: "MG DCDC Temperature"
    unit_of_measurement: "°C"
  - platform: template
    id: mg_hv_batt_temp
    name: "MG HV Battery Temp"
    unit_of_measurement: "°C"
  - platform: template
    id: mg_batt_coolant_temp
    name: "MG Battery Coolant Temp"
    unit_of_measurement: "°C"
  - platform: template
    id: mg_ambient_temp
    name: "MG Ambient Temperature"
    unit_of_measurement: "°C"
  - platform: template
    id: mg_batt_voltage
    name: "MG HV Battery Voltage"
    unit_of_measurement: "V"
    accuracy_decimals: 1
  - platform: template
    id: mg_batt_current
    name: "MG Battery Current"
    unit_of_measurement: "A"
    accuracy_decimals: 2
  - platform: template
    id: mg_soc_raw
    name: "MG SOC Raw"
    unit_of_measurement: "%"
  - platform: template
    id: mg_soh
    name: "MG SOH"
    unit_of_measurement: "%"
  - platform: template
    id: mg_charge_power
    name: "MG Charging Rate"
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    icon: "mdi:flash"
    lambda: |-
      if (std::isnan(id(mg_batt_voltage).state) || std::isnan(id(mg_batt_current).state)) return 0.0;
      // V * A / 1000. Töltéskor (negatív áramnál) legyen pozitív a kW.
      float pwr = (id(mg_batt_voltage).state * id(mg_batt_current).state) / 1000.0f;
      return (pwr < 0) ? (pwr * -1.0f) : pwr;
    update_interval: 2s
  - platform: template
    id: mg_charge_time_remaining
    name: "MG Charge Time Remaining"
    unit_of_measurement: "min"
  - platform: template
    id: mg_ac_charge_count
    name: "MG AC Charge Count"
  - platform: template
    id: mg_dc_charge_count
    name: "MG DC Charge Count"
  - platform: template
    id: mg_tpms_fl
    name: "MG TPMS FL"
    unit_of_measurement: "kPa"
  - platform: template
    id: mg_tpms_fr
    name: "MG TPMS FR"
    unit_of_measurement: "kPa"
  - platform: template
    id: mg_tpms_rr
    name: "MG TPMS RR"
    unit_of_measurement: "kPa"
  - platform: template
    id: mg_tpms_rl
    name: "MG TPMS RL"
    unit_of_measurement: "kPa"

